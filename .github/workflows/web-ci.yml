name: Web App CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web_app/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web_app/**'

defaults:
  run:
    working-directory: ./web_app

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'web_app/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run format -- --check

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'web_app/package-lock.json'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v3
        with:
          name: dist
          path: web_app/dist
          retention-days: 5

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'web_app/package-lock.json'
      - run: npm ci
      - run: npm run test -- --coverage
      - uses: codecov/codecov-action@v3
        with:
          files: ./web_app/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
